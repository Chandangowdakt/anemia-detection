<!DOCTYPE html>
<html>
<head>
  <title>Anemia Detector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe4f0;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius-lg: 20px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', Arial, sans-serif;
      background: radial-gradient(circle at top left, #eff6ff, #f8fafc 45%, #eef2ff);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 32px 28px;
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeUp 0.45s ease both;
    }

    .container:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      font-weight: 700;
      color: #1e293b;
    }

    .subtitle {
      margin: 10px auto 24px;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .upload-box {
      background: var(--surface-soft);
      border: 2px dashed #93c5fd;
      border-radius: 16px;
      padding: 22px 16px;
      margin-bottom: 18px;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.22s ease, box-shadow 0.22s ease;
    }

    .upload-box:hover {
      border-color: var(--primary);
      background: #eff6ff;
      transform: translateY(-1px) scale(1.003);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .upload-label {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #334155;
    }

    input[type=file] {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      color: #334155;
    }

    button {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.32);
    }

    button:active {
      transform: translateY(0) scale(0.99);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.24);
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 2px;
    }

    input[type=file]:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 3px;
      border-radius: 8px;
    }

    #loadingMsg {
      display: none;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .container:hover,
      .upload-box:hover,
      button:hover,
      button:active {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>AI-Based Anemia Detection System</h1>
    <p class="subtitle">
      Upload a clear conjunctiva image for AI-powered screening with explainable prediction insights.
    </p>

    <form id="uploadForm" action="/predict" method="post" enctype="multipart/form-data">
      <div class="upload-box">
        <span class="upload-label">Drop image here or choose a file</span><br>
        <input type="file" name="image" accept="image/*" required>
      </div>
      <button type="button" onclick="openCamera()">Use Camera</button>
      <br><br>
      <video id="camera" autoplay style="display:none; width:100%;"></video>
      <button id="captureBtn" type="button" style="display:none;">Capture</button>
      <canvas id="canvas" style="display:none;"></canvas>
      <br><br>
      <button id="analyzeBtn" type="submit">Analyze Image</button>
    </form>

    <p id="loadingMsg">
      <span class="spinner"></span>
      Uploading image and running model inference...
    </p>
  </main>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const loadingMsg = document.getElementById('loadingMsg');
    const analyzeBtn = document.getElementById('analyzeBtn');
    uploadForm.addEventListener('submit', function () {
      loadingMsg.style.display = 'flex';
      analyzeBtn.disabled = true;
      analyzeBtn.style.opacity = '0.85';
      analyzeBtn.style.cursor = 'not-allowed';
    });

    function openCamera() {
      const video = document.getElementById('camera');
      const btn = document.getElementById('captureBtn');
      video.style.display = 'block';
      btn.style.display = 'inline-block';

      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
        });
    }

    document.getElementById('captureBtn').onclick = function() {
      const video = document.getElementById('camera');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0);

      canvas.toBlob(blob => {
        const fileInput = document.querySelector('input[type="file"]');
        const file = new File([blob], "capture.jpg", { type: "image/jpeg" });

        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        fileInput.files = dataTransfer.files;
      });
    };

    document.querySelector("form").addEventListener("submit", function() {
      const msg = document.createElement("p");
      msg.innerText = "Analyzing image, please wait...";
      this.appendChild(msg);
    });
  </script>
</body>
</html>
