<!DOCTYPE html>
<html>
<head>
  <title>Anemia Detector</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe4f0;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius-lg: 20px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', Arial, sans-serif;
      background: radial-gradient(circle at top left, #eff6ff, #f8fafc 45%, #eef2ff);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 32px 28px;
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeUp 0.45s ease both;
    }

    .container:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      font-weight: 700;
      color: #1e293b;
    }

    .subtitle {
      margin: 10px auto 24px;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .upload-box {
      background: var(--surface-soft);
      border: 2px dashed #93c5fd;
      border-radius: 16px;
      padding: 22px 16px;
      margin-bottom: 18px;
      transition: border-color 0.25s ease, background 0.25s ease, transform 0.22s ease, box-shadow 0.22s ease;
    }

    .upload-box:hover {
      border-color: var(--primary);
      background: #eff6ff;
      transform: translateY(-1px) scale(1.003);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .upload-label {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #334155;
    }

    input[type=file] {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      color: #334155;
    }

    button {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.32);
    }

    button:active {
      transform: translateY(0) scale(0.99);
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.24);
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 2px;
    }

    input[type=file]:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 3px;
      border-radius: 8px;
    }

    #loadingMsg {
      display: none;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.95rem;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .container:hover,
      .upload-box:hover,
      button:hover,
      button:active {
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>AI-Based Anemia Detection System</h1>
    <p class="subtitle">
      Upload a clear conjunctiva image for AI-powered screening with explainable prediction insights.
    </p>

    <form id="uploadForm" action="/predict" method="post" enctype="multipart/form-data">
      <div class="upload-box">
        <span class="upload-label">Drop image here or choose a file</span><br>
        <input id="imageInput" type="file" name="image" accept="image/*" required>
      </div>
      <button id="useCameraBtn" type="button">Use Camera</button>
      <br><br>

      <!-- Camera Section HTML -->
      <div id="cameraSection" style="display:none; margin-top: 16px;">
        <video id="cameraFeed" autoplay playsinline
               style="width:100%; border-radius:8px; max-height:300px;
                      object-fit:cover;"></video>
        <canvas id="captureCanvas" style="display:none;"></canvas>
        <div style="display:flex; gap:12px; margin-top:12px;
                     justify-content:center; flex-wrap:wrap;">
          <button type="button" id="captureBtn"
                  style="background:#3b82f6; color:white; border:none;
                         padding:10px 24px; border-radius:8px;
                         font-size:15px; cursor:pointer; font-weight:500;">
            Capture Photo
          </button>
          <button type="button" id="retakeBtn" style="display:none;
                  background:#6b7280; color:white; border:none;
                  padding:10px 24px; border-radius:8px;
                  font-size:15px; cursor:pointer;">
            Retake
          </button>
          <button type="button" id="closeCameraBtn"
                  style="background:#ef4444; color:white; border:none;
                         padding:10px 24px; border-radius:8px;
                         font-size:15px; cursor:pointer;">
            Close Camera
          </button>
        </div>
        <img id="capturedPreview" style="display:none; width:100%;
             border-radius:8px; margin-top:8px; max-height:300px;
             object-fit:cover;" alt="Captured photo"/>
        <p id="captureStatus" style="text-align:center; color:#10b981;
           font-size:13px; margin-top:6px; display:none;">
          Photo captured! Click Analyze Image to proceed.
        </p>
      </div>

      <br><br>
      <button id="analyzeBtn" type="submit">Analyze Image</button>
    </form>

    <p id="loadingMsg">
      <span class="spinner"></span>
      Uploading image and running model inference...
    </p>
  </main>

  <script>
    // Camera JavaScript - Replace ALL existing camera JS with this
    let stream = null;
    let capturedBlob = null;

    const uploadForm = document.getElementById('uploadForm');
    const loadingMsg = document.getElementById('loadingMsg');
    const analyzeBtn = document.getElementById('analyzeBtn');
    uploadForm.addEventListener('submit', function () {
      loadingMsg.style.display = 'flex';
      analyzeBtn.disabled = true;
      analyzeBtn.style.opacity = '0.85';
      analyzeBtn.style.cursor = 'not-allowed';
    });

    // Use Camera button
    document.getElementById('useCameraBtn').addEventListener('click', async function() {
      const cameraSection = document.getElementById('cameraSection');
      cameraSection.style.display = 'block';

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });
        document.getElementById('cameraFeed').srcObject = stream;
        document.getElementById('captureBtn').style.display = 'inline-block';
        document.getElementById('capturedPreview').style.display = 'none';
        document.getElementById('retakeBtn').style.display = 'none';
        document.getElementById('captureStatus').style.display = 'none';
        capturedBlob = null;
      } catch (err) {
        console.error('Camera error:', err);
        alert('Camera access denied or not available. Please upload an image file instead.');
        cameraSection.style.display = 'none';
      }
    });

    // Capture button
    document.getElementById('captureBtn').addEventListener('click', function() {
      const video = document.getElementById('cameraFeed');
      const canvas = document.getElementById('captureCanvas');
      const preview = document.getElementById('capturedPreview');

      // Set canvas size to video size
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;

      // Draw video frame to canvas
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Convert to blob and show preview
      canvas.toBlob(function(blob) {
        capturedBlob = blob;
        const url = URL.createObjectURL(blob);
        preview.src = url;
        preview.style.display = 'block';

        // Stop video stream
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
        document.getElementById('cameraFeed').style.display = 'none';
        document.getElementById('captureBtn').style.display = 'none';
        document.getElementById('retakeBtn').style.display = 'inline-block';
        document.getElementById('captureStatus').style.display = 'block';

        // Create a File from blob and set it to the file input
        const file = new File([blob], 'camera_capture.jpg', { type: 'image/jpeg' });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        document.getElementById('imageInput').files = dataTransfer.files;

      }, 'image/jpeg', 0.9);
    });

    // Retake button
    document.getElementById('retakeBtn').addEventListener('click', async function() {
      capturedBlob = null;
      document.getElementById('capturedPreview').style.display = 'none';
      document.getElementById('cameraFeed').style.display = 'block';
      document.getElementById('retakeBtn').style.display = 'none';
      document.getElementById('captureBtn').style.display = 'inline-block';
      document.getElementById('captureStatus').style.display = 'none';

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });
        document.getElementById('cameraFeed').srcObject = stream;
      } catch(err) {
        alert('Could not restart camera');
      }
    });

    // Close camera button
    document.getElementById('closeCameraBtn').addEventListener('click', function() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      document.getElementById('cameraSection').style.display = 'none';
      document.getElementById('cameraFeed').style.display = 'block';
      capturedBlob = null;
    });

    // Make sure Use Camera button has correct ID
    // The button in HTML must have id="useCameraBtn"
  </script>
</body>
</html>
